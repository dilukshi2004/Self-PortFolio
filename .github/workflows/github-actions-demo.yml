name: 🚀 Portfolio CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🐳 Build Docker image
        run: docker build -t my-portfolio .

      - name: ✅ Run container test
        run: |
          docker run -d -p 80:80 --name test-portfolio my-portfolio
          sleep 3
          curl -f http://localhost || exit 1
          echo "✅ Website is running successfully!"

      - name: 🧹 Cleanup
        run: docker rm -f test-portfolio
